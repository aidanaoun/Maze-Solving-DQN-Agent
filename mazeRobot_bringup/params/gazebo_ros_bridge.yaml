# clock from Gazebo to ROS
- ros_topic_name: "clock"
  gz_topic_name: "/world/experiment_world/clock"
  ros_type_name: "rosgraph_msgs/msg/Clock"
  gz_type_name: "gz.msgs.Clock"
  direction: GZ_TO_ROS

